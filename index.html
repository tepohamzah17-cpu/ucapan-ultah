<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Privat Aman</title>
    <style>
        /* Desain Dasar Responsif & Modern */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #28a745; margin-top: 8px; }
        .btn-secondary:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .hidden { display: none !important; }
        
        #gift-box-wrapper {
            cursor: pointer;
            font-size: 60px;
            margin: 20px 0;
            display: inline-block;
            transition: transform 0.2s;
        }
        #gift-box-wrapper:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- 1. KARTU LOGIN & REGISTRASI -->
    <div id="login-card" class="card">
        <h2>Halaman Privat 🔒</h2>
        <p>Silakan masuk atau daftar untuk melihat pesan spesial di dalam.</p>
        
        <div class="form-group">
            <label for="input-email">Email Terverifikasi:</label>
            <input type="email" id="input-email" placeholder="contoh@gmail.com">
        </div>
        
        <div class="form-group">
            <label for="input-password">Kata Sandi:</label>
            <input type="password" id="input-password" placeholder="Masukkan kata sandi">
        </div>
        
        <button id="btn-login" class="btn-primary">Masuk Aplikasi</button>
        <button id="btn-register" class="btn-primary btn-secondary">Daftar Akun Baru</button>
    </div>

    <!-- 2. KARTU KONTEN UTAMA (TERKUNCI VERIFIKASI) -->
    <div id="content-card" class="card hidden">
        <div id="main-container">
            <h2>Selamat Datang! 🎉</h2>
            <p>Akun Anda terverifikasi asli. Ketuk kado di bawah untuk membuka hadiah kejutan Anda.</p>
            <div id="gift-box-wrapper">🎁</div>
            <br>
            <button id="btn-logout" class="btn-primary btn-danger">Keluar Akun</button>
        </div>
    </div>

    <!-- 3. KARTU ISI DALAM KADO (VERSION ESTETIK & SINEMATIK) -->
    <div id="galaxy-universe" class="card hidden" style="background: #fffdf9; border: 1px solid #f3e9dc; max-width: 450px;">
        <div id="surprised-content" style="padding: 10px; text-align: left;">
            <!-- Header Surat -->
            <div style="text-align: center; margin-bottom: 25px;">
                <span style="font-size: 35px;">💌</span>
                <h2 style="color: #cd5c5c; font-family: 'Georgia', serif; font-style: italic; margin-top: 10px;">Sebuah Pesan Rahasia</h2>
                <div style="width: 50px; height: 2px; background: #d4a373; margin: 10px auto;"></div>
            </div>

            <!-- Konten Surat Utama -->
            <div style="font-family: 'Georgia', serif; color: #4a3f35; line-height: 1.8; font-size: 15px; background: #fdfbf7; padding: 20px; border-radius: 8px; box-shadow: inset 0 0 8px rgba(0,0,0,0.02); border-left: 3px solid #d4a373;">
                <p style="margin-top: 0;">Halo Kamu, NUR OKTALIANA RAHAYU✨</p>
                
                <!-- Efek Teks Mengetik -->
                <div id="typing-text" style="min-height: 60px; font-style: italic; color: #5c4d3c; white-space: pre-wrap; word-wrap: break-word;">
                    <!-- Teks otomatis berjalan di sini -->
                </div>
                <p style="text-align: right; margin-bottom: 0; font-size: 13px; color: #8c7864;">
                    -Muhamad Imron Hamzah ❤️
                </p>
            </div>
        </div>
        
        <button id="btn-back-gift" class="btn-primary" style="background: #d4a373; border: none; margin-top: 25px; font-family: sans-serif;">
            Tutup Pesan
        </button>
    </div>

    <!-- AUDIO LATAR BELAKANG -->
    <audio id="bg-music" src="assets/music.mp3" preload="auto" loop></audio>

    <!-- ========================================== -->
    <!-- LOGIKA SISTEM INTEGRASI FIREBASE & SHEETS  -->
    <!-- ========================================== -->
    <!-- Gunakan type="module" untuk menghubungkan logika eksternal app.js -->
    <script type="module" src="app.js"></script>

    <!-- Script Pembantu untuk Animasi UI & Efek Mengetik -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const giftBoxWrapper = document.getElementById('gift-box-wrapper');
            const contentCard = document.getElementById('content-card');
            const galaxyUniverse = document.getElementById('galaxy-universe');
            const btnBackGift = document.getElementById('btn-back-gift');
            const txtElement = document.getElementById('typing-text');

            const pesanRahasia = `Selamat ulang tahun, Cantik! 🎉🤍

Aku sempat berpikir, apakah aku perlu mengucapkan ini atau tidak. Pada akhir-akhir ini, aku memilih untuk tetap mengirimkan doa, karena apa pun yang pernah terjadi di antara kita, aku tetap ingin mengingatmu dengan cara yang baik.

Semoga usiamu yang baru membawa lebih banyak hal yang membuatmu merasa cukup, tenang, dan bahagia. Semoga setiap langkahmu dipenuhi orang-orang yang menghargaimu, setiap usaha yang kamu lakukan menemukan hasil terbaiknya, dan setiap doa yang kamu simpan diam-diam dijawab pada waktu yang paling tepat.

Waktu memang mengubah banyak hal. Ada orang yang tetap bersama, ada juga yang akhirnya hanya menjadi bagian dari cerita. Kita mungkin termasuk yang kedua. Namun, bukan berarti semua yang pernah kita lalui kehilangan maknanya. Bagiku, setiap pertemuan selalu meninggalkan pelajaran, dan kamu adalah salah satu bagian yang ikut membentuk diriku menjadi seperti sekarang.

Aku tidak tahu seperti apa kehidupanmu hari ini. Mungkin kamu sedang mengejar impianmu, mungkin sedang menghadapi tantangan yang tidak banyak orang tahu, atau mungkin justru sedang berada di fase paling membahagiakan dalam hidupmu. Apa pun itu, semoga semuanya berjalan baik. Semoga kamu selalu diberi kekuatan ketika lelah, ketenangan ketika keadaan tidak sesuai harapan, dan alasan untuk tetap percaya bahwa akan selalu ada hari yang lebih baik.

Aku tidak menulis ini untuk mengulang cerita yang sudah selesai, juga bukan untuk membuatmu melihat ke belakang. Aku hanya ingin memastikan bahwa, di hari yang spesial ini, ada seseorang yang pernah mengenalmu dengan cukup dekat dan masih mendoakan yang terbaik untukmu.

Terima kasih untuk semua cerita yang pernah ada. Tidak semuanya berakhir seperti yang kita harapkan, tetapi itu tidak menghapus rasa syukur karena pernah saling mengenal.

Selamat bertambah usia. Semoga kamu selalu menjadi seseorang yang sehat, bahagia, dan dicintai dengan cara yang pantas. Dan semoga, ke mana pun hidup membawamu nanti, kamu selalu menemukan alasan untuk tersenyum.

Selamat ulang tahun. Semoga segala hal baik selalu menyertaimu.`;

            const paragrafArray = pesanRahasia.split('\n\n');

            window.startGalaxyHeart = async function() {
                if (!txtElement) return;
                txtElement.innerHTML = "";
                
                for (const paragraf of paragrafArray) {
                    const p = document.createElement('p');
                    p.innerText = paragraf;
                    p.style.marginBottom = "20px";
                    p.style.opacity = "0";
                    p.style.transition = "opacity 1s ease-in";
                    
                    txtElement.appendChild(p);
                    
                    setTimeout(() => { p.style.opacity = "1"; }, 50);
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }
            }

            if (btnBackGift) {
                btnBackGift.addEventListener('click', () => {
                    galaxyUniverse.classList.add('hidden');
                    contentCard.classList.remove('hidden');
                });
            }
        });
    </script>
</body>
</html>
